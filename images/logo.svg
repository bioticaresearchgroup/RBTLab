<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&amp;display=swap');
            
            text {
                font-family: 'Inter', sans-serif;
                fill: #2C3E50; /* Deep Charcoal for main text */
            }
            .text-main {
                font-weight: 700;
                font-size: 24px;
                letter-spacing: 2px;
            }
            .text-sub {
                font-weight: 300;
                font-size: 16px;
                letter-spacing: 5px;
                fill: #7F8C8D; /* Muted slate for subtext */
            }

            /* --- ANIMATION KEYFRAMES --- */
            
            /* Outer scaffold geometry: Draws itself on load */
            @keyframes drawScaffold {
                0% { stroke-dashoffset: 1200; opacity: 0; }
                30% { opacity: 0.5; }
                100% { stroke-dashoffset: 0; opacity: 1; }
            }

            /* Regenerative cellular wave (expanding, repeating) */
            @keyframes organicRegen {
                0% { r: 10px; opacity: 0; stroke-width: 1; }
                10% { opacity: 0.7; }
                80% { opacity: 0.3; stroke-width: 2; }
                100% { r: 85px; opacity: 0; stroke-width: 0.5; }
            }

            /* Floating/evolving state for lattice nodes */
            @keyframes evolutionNode {
                0% { transform: translateY(0px) translateX(0px); }
                50% { transform: translateY(-4px) translateX(2px); }
                100% { transform: translateY(0px) translateX(0px); }
            }

            /* Pulse animation for the central Theranostic beacon */
            @keyframes pulseTheranostic {
                0% { r: 8px; filter: drop-shadow(0 0 2px #FF6B6B); opacity: 0.8; }
                50% { r: 11px; filter: drop-shadow(0 0 10px #FF6B6B); opacity: 1; }
                100% { r: 8px; filter: drop-shadow(0 0 2px #FF6B6B); opacity: 0.8; }
            }

            /* --- APPLICATION OF ANIMATIONS --- */
            .main-scaffold {
                stroke-dasharray: 1200;
                stroke-dashoffset: 1200;
                animation: drawScaffold 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }
            
            .regen-wave-1 {
                animation: organicRegen 4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
                transform-origin: 400px 175px;
            }
            
            .regen-wave-2 {
                animation: organicRegen 4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
                animation-delay: 2s;
                transform-origin: 400px 175px;
            }

            .moving-cell {
                animation: evolutionNode 6s ease-in-out infinite;
                animation-delay: 1s;
            }
            
            .theranostic-pulse {
                animation: pulseTheranostic 3s ease-in-out infinite;
                transform-origin: 400px 175px;
                fill: #E74C3C; /* Precision Target Red */
            }
        </style>

        <linearGradient id="bioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#16A085" /> /* Continuity Teal */
            <stop offset="50%" stop-color="#2980B9" /> /* Institutional Blue */
            <stop offset="100%" stop-color="#8E44AD" /> /* Translational Purple */
        </linearGradient>
    </defs>

    <rect width="100%" height="100%" fill="#FAFAFA" />

    <g id="visual-emblem">
        <circle class="regen-wave-1" cx="400" cy="175" r="15" fill="none" stroke="#2980B9" />
        <circle class="regen-wave-2" cx="400" cy="175" r="15" fill="none" stroke="#16A085" />

        <path class="main-scaffold" d="M 400,85 
                 C 440,95 470,125 470,175 
                 C 470,225 430,255 400,265 
                 C 370,255 330,225 330,175 
                 C 330,125 360,95 400,85 Z" 
              fill="none" stroke="url(#bioGrad)" stroke-width="2.5" stroke-linecap="round" />

        <path class="main-scaffold" d="M 330,175 L 370,175 L 400,135 L 400,85" fill="none" stroke="#2980B9" stroke-width="1" opacity="0.3" />
        <path class="main-scaffold" d="M 470,175 L 430,175 L 400,135" fill="none" stroke="#16A085" stroke-width="1" opacity="0.3" />
        <path class="main-scaffold" d="M 370,175 L 400,215 L 430,175" fill="none" stroke="#8E44AD" stroke-width="1" opacity="0.3" />
        <path class="main-scaffold" d="M 400,215 L 400,265" fill="none" stroke="#8E44AD" stroke-width="1" opacity="0.3" />

        <circle cx="370" cy="175" r="3.5" fill="#2980B9" />
        <circle class="moving-cell" cx="430" cy="175" r="3.5" fill="#16A085" />
        <circle cx="400" cy="135" r="3.5" fill="#2c3e50" opacity="0.6" />
        <circle class="moving-cell" cx="400" cy="215" r="3.5" fill="#8E44AD" />

        <circle class="theranostic-pulse" cx="400" cy="175" r="8" />
    </g>

    <g id="typography-block" text-anchor="middle">
        <text x="400" y="350" class="text-main">REGENERATIVE BIOMATERIALS</text>
        <text x="400" y="385" class="text-main" style="font-weight: 500; font-size: 21px; opacity: 0.9;">&amp; THERANOSTICS LABORATORY</text>
        
        <rect x="365" y="415" width="70" height="1.5" rx="0.75" fill="#BDC3C7" />
        
        <text x="404" y="445" class="text-sub">POLYMER SCIENCE &amp; BIOMEDICAL ENGINEERING</text>
    </g>
</svg>
