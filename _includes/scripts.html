<!-- third party scripts -->
<script src="https://unpkg.com/@popperjs/core@2" defer></script>
<script src="https://unpkg.com/tippy.js@6" defer></script>
<script src="https://unpkg.com/mark.js@8" defer></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- include all js in scripts folder -->
{% assign scripts = site.static_files | where_exp: "file", "file.path contains '/_scripts'" %}
{% for script in scripts %}
  <script src="{{ script.path | relative_url }}"></script>
{% endfor %}
{% if page.url == "/" or page.url == "/index.html" %}
<script>
  window.addEventListener('DOMContentLoaded', () => {
    // 1. Check if the user has already seen the popup in this browser session
    if (!sessionStorage.getItem('announcementSeen')) {
      
      // 2. Fire the SweetAlert2 popup
      Swal.fire({
        imageUrl: "{{ site.baseurl }}/images/AICTENEWS.jpg",
        imageAlt: "AICTE Announcement",
        showConfirmButton: false, // Hides the default "OK" button
        showCloseButton: true,    // Shows a clean "X" button in the top right
        background: '#ffffff',    // Keeps the container background clean white
        maxWidth: '85vw',         // Ensures it looks great and scales well on mobile screens
        padding: '10px',
        customClass: {
          popup: 'home-announcement-popup'
        }
      });

      // 3. Mark the session so it doesn't pop up again when they click back to Home
      sessionStorage.setItem('announcementSeen', 'true');
    }
  });
</script>
{% endif %}
