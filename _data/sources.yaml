- id: doi:10.1016/j.materresbull.2025.113339
  type: paper
  description: Image guided therapeutics, a multimodal approach in cancer treatment where combinatorial imaging and therapy in a single system, has become highly pertinent contemporary chemotherapeutic approach. Herein, a bismuth/Fe3O4 metal organic framework nanocomposite system (BiTP/ Fe3O4) having high X-ray visibility (2981.8 HU) and saturation magnetization prepared by in situ synthesis is presented for computed tomography based imaging and magnetic hyperthermia therapy. Surface anchored Fe3O4 nanoparticles on MOF crystals enable magnetic targeting in the presence of external magnetic field and exhibit hyperthermia potential while bismuth serve as a potential contrast agent due to its intrinsic radiopaque properties. The synergistic effect generated in a single system has a hyperthermia time-temperature profile (42. 1 °C within 7 min) and X-ray visibility. Cytocompatibility of the system has been verified by MTT and live dead assay. Preferential uptake of BiTP/Fe3O4 by Human osteosarcoma cells was affirmed by prussian blue staining, which further benefits to the hyperthermia treatment.
